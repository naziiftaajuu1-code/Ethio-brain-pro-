name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip App files
      run: unzip app.zip -d my_app

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: cd my_app && chmod +x gradlew

    - name: Build Debug APK
      run: cd my_app && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Ethio-Brain-Pro-APK
        path: my_app/app/build/outputs/apk/debug/*.apk
        
